name: Deploy to eliassmyers.wiki/chico-scraper
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout CHICO-SCRAPER
        uses: actions/checkout@v4

      - name: Checkout ELIASSMYERS into subfolder
        uses: actions/checkout@v4
        with:
          repository: eliassantiagomyers-glitch/eliassmyers
          token: ${{ secrets.ELIASSMYERS_DEPLOY_TOKEN }}
          path: ELIASSMYERS-deploy

      - name: Copy files to subfolder
        run: |
          # 1. Create a temporary spot for your files
          mkdir -p /tmp/scraper_files
          
          # 2. Copy everything to that temporary spot (avoiding the loop)
          # We exclude the ELIASSMYERS-deploy folder specifically
          rsync -av . /tmp/scraper_files --exclude ELIASSMYERS-deploy
          
          # 3. Clean out the old version in the destination
          rm -rf ELIASSMYERS-deploy/chico-scraper
          mkdir -p ELIASSMYERS-deploy/chico-scraper
          
          # 4. Move the files from the temp spot to the destination
          cp -r /tmp/scraper_files/* ELIASSMYERS-deploy/chico-scraper/
          
          # 5. Cleanup
          rm -rf ELIASSMYERS-deploy/chico-scraper/.git
          rm -rf ELIASSMYERS-deploy/chico-scraper/.github

      - name: Commit and push to repo1
        working-directory: ELIASSMYERS-deploy
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add chico-scraper/
          git commit -m "Update chico-scraper from repo2" || echo "No changes"
          git push

name: Scrape & Deploy

on:
  schedule:
    # 7:00 AM UTC = midnight Pacific (roughly) — catches overnight updates
    - cron: "0 7 * * *"
    # 7:00 PM UTC = noon Pacific — catches daytime agenda posts
    - cron: "0 19 * * *"
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python run.py

- name: Commit updated data + dashboard
        run: |
          git config user.name  "chico-scraper[bot]"
          git config user.email "chico-scraper@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "auto: scrape $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
